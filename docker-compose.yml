# Grid Dispatch Agent v2.0 - 复用v1.0镜像 + 挂载新代码
# 适用于已有 v1.0 镜像的内网环境

version: '3.8'

services:
  grid-agent:
    # 使用已存在的1.0镜像（请确保镜像名正确）
    image: grid-dispatch-agent:1.0
    container_name: grid-agent-api
    ports:
      - "8000:8000"
    environment:
      # LLM配置 - 请替换为你的LLM地址
      - LLM_URL=http://196.167.30.204:8765/v1
      - LLM_API_KEY=${LLM_API_KEY:-}
      
      # 电网API配置 - 请替换为你的电网API地址
      - GRID_API_BASE=http://196.167.30.65:30002/dispatch/commonData
      - GRID_API_USER=66605384.475033835
      
      - PYTHONUNBUFFERED=1
    # 挂载新代码（覆盖镜像内的代码）
    volumes:
      - ./grid_agent:/app/grid_agent
      - ./api:/app/api
    networks:
      - grid-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  grid-network:
    driver: bridge