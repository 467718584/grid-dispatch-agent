name: Build Test

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Test basic docker
        run: |
          docker version
          docker info
      
      - name: Build simple image
        run: |
          echo "FROM python:3.11-slim" > Dockerfile.test
          echo "RUN echo 'hello'" >> Dockerfile.test
          docker build -t test:local -f Dockerfile.test .
          docker run --rm test:local