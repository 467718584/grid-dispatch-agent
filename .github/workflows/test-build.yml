name: Build Test

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check files
        run: |
          echo "=== PWD ==="
          pwd
          echo "=== Files ==="
          ls -la
          echo "=== Dockerfile ==="
          cat Dockerfile
      
      - name: Build
        run: |
          echo "=== Building ==="
          docker build -t test:image . 2>&1
          echo "=== Exit: $? ==="
      
      - name: Verify
        run: docker images