name: Build Test

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Dockerfile
        run: |
          echo "=== Dockerfile exists? ==="
          ls -la Dockerfile
          echo ""
          echo "=== Content ==="
          cat Dockerfile
      
      - name: Simple build test
        run: |
          echo "=== Simple test ==="
          echo 'FROM python:3.11-slim' > test.Dockerfile
          echo 'RUN echo hello' >> test.Dockerfile
          docker build -f test.Dockerfile -t simple:test .
          echo "=== Done ==="
      
      - name: Full build
        run: docker build -t test:image -f Dockerfile .