name: Build Test

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check files
        run: |
          echo "=== Files ==="
          ls -la
          echo "=== Dockerfile ==="
          cat Dockerfile
      
      - name: Build image
        run: docker build -t test:image .
      
      - name: Run briefly to test
        run: |
          docker run --rm -d --name test-container test:image
          sleep 5
          docker logs test-container
          docker stop test-container || true
      
      - name: Verify
        run: docker images | grep test