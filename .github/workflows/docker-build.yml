name: Build and Push Docker Image

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build image
        run: |
          docker build -t grid-dispatch-agent:test .
          docker images | grep grid-dispatch
          echo "## Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "Image: grid-dispatch-agent:test" >> $GITHUB_STEP_SUMMARY