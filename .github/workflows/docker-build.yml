name: Build and Push Docker Image

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/grid-dispatch-agent

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Verify checkout
        run: |
          echo "=== Files in workspace ==="
          pwd
          ls -la
          echo ""
          echo "=== .git directory ==="
          ls -la .git/ 2>/dev/null || echo "No .git"
          echo ""
          echo "=== Dockerfile content ==="
          if [ -f Dockerfile ]; then cat Dockerfile; else echo "NO DOCKERFILE FOUND"; fi
      
      - name: Build image
        run: |
          echo ""
          echo "=== Building Docker image ==="
          docker build --progress=plain -t test:image . 2>&1 | head -100
          echo "=== Build exit code: $? ==="
      
      - name: Check result
        if: success()
        run: |
          echo "Build succeeded"
          docker images
      
      - name: Push image
        if: github.event_name != 'pull_request' && success()
        run: |
          docker tag test:image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          echo "## Built: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY