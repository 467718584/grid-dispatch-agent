name: Build and Push Docker Image

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/grid-dispatch-agent

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Debug - list files
        run: |
          echo "=== Current directory ==="
          ls -la
          echo ""
          echo "=== Dockerfile ==="
          cat Dockerfile
          echo ""
          echo "=== grid_agent directory ==="
          ls -la grid_agent/
          echo ""
          echo "=== api directory ==="
          ls -la api/
      
      - name: Build image
        run: |
          set -x
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest . 2>&1
          set +x
      
      - name: Test image
        run: |
          docker images | grep grid-dispatch
          docker history ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest || true
      
      - name: Push image
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          echo "## ✅ Docker Image Built and Pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY